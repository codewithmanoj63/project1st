<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adistion3</title>
    <style>
        .section {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contaner {
            background-color: black;
            margin: auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 70vh;
            height: 60vh;
            border-radius: 20px;
            border: 2px solid;
        }

        .add {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: red;
            color: aliceblue;
            font-size: 40px;
            height: 40px;
            width: 40px;
        }

        .multi {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: red;
            color: aliceblue;
            font-size: 40px;
            height: 40px;
            width: 40px;
        }
        .contaner h2{
            color: aliceblue;
        }
    </style>
</head>

<body>
    <section>
        <div class="contaner">
            <button class="add" onclick="oky()">-</button>
            <h2 id="resive">0</h2>
            <button class="multi" onclick="sub()">+</button>
        </div>
    </section>
    <script>
        let a = 0
        function sub() {
            a = a + 1;
            document.getElementById("resive").innerHTML = a;
        }
        function oky() {
            a = a - 1
            if(a < 0){
 
                alert("hjuyt")
            }else{
                 document.getElementById("resive").innerHTML = a;
            }
           
        }
    </script>

</body>

</html>
