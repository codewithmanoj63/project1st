<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dynamic password</title>

    <script>
        function stp(){
             var a = document.getElementById("pwd");
        a.type="text";
        }
       
    </script>
</head>
<body>
    <form>
        <input type="password" name="password" id="pwd">
        <input type="checkbox" onclick="stp()">
    </form>
    
</body>
</html>
